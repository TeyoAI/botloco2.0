[supervisord]
nodaemon=true
loglevel=info
logfile=/dev/null
logfile_maxbytes=0

; Flask escucha en el puerto que asigne Railway ($PORT).
[program:flask]
command=gunicorn --bind 0.0.0.0:%(ENV_PORT)s --workers 1 --timeout 120 --access-logfile - botapp:app
directory=/app
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
priority=10

; WhatsApp bridge: le pasamos la URL de Flask dinámicamente usando el $PORT de Railway.
[program:bridge]
command=sh -c "FLASK_WEBHOOK_URL=http://127.0.0.1:${PORT}/webhook node /app/whatsapp-bridge/index.js"
directory=/app/whatsapp-bridge
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
priority=20
